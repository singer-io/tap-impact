version: 4
jobs:
  build:
    docker:
      - image: 218546966473.dkr.ecr.us-east-1.amazonaws.com/circle-ci:stitch-tap-tester-uv
    steps:
      - checkout
      - run:
          name: 'Setup virtual env'
          command: |
            uv venv --python 3.12 /usr/local/share/virtualenvs/tap-impact
            source /usr/local/share/virtualenvs/tap-impact/bin/activate
            uv pip install -U pip setuptools
            uv pip install .[dev]
      - run:
          name: 'pylint'
          command: |
            source /usr/local/share/virtualenvs/tap-impact/bin/activate
            pylint tap_impact -d C,R,W
      - run:
          name: 'JSON Validator'
          command: |
            source /usr/local/share/virtualenvs/tap-tester/bin/activate
            stitch-validate-json tap_impact/schemas/*.json
      - add_ssh_keys
      - run:
          name: 'Unit Tests'
          command: |
            source /usr/local/share/virtualenvs/tap-impact/bin/activate
            uv pip install pytest coverage parameterized
            coverage run -m pytest tests/unittests -v
            coverage html
          when: always
      - store_test_results:
          path: test_output/report.xml
      - store_artifacts:
          path: htmlcov
      - run:
          name: 'Mock Integration Tests'
          command: |
            source /usr/local/share/virtualenvs/tap-impact/bin/activate
            uv pip install pytest
            coverage run -m pytest tests/mock_integration/ -v
      # - add_ssh_keys
      # TODO | https://stitchdata.atlassian.net/browse/SRCE-4593 (SRCE-4593 -> SRCE-4597)
      # - run:
      #     name: 'Integration Tests'
      #     command: |
      #       aws s3 cp s3://com-stitchdata-dev-deployment-assets/environments/tap-tester/sandbox dev_env.sh
      #       source dev_env.sh
      #       source /usr/local/share/virtualenvs/tap-tester/bin/activate
      #       run-a-test --tap=tap-impact \
      #                  --target=target-stitch \
      #                  --orchestrator=stitch-orchestrator \
      #                  --email=harrison+sandboxtest@stitchdata.com \
      #                  --password=$SANDBOX_PASSWORD \
      #                  --client-id=50 \
      #                  tap_tester.suites.impact
workflows:
  version: 2
  commit:
    jobs:
      - build:
          context: circleci-user
  build_daily:
    triggers:
      - schedule:
          cron: "0 0 * * *"
          filters:
            branches:
              only:
                - master
    jobs:
      - build:
          context: circleci-user
